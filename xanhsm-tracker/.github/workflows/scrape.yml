name: Ride Price Scraper

on:
  # ── Scheduled runs (IST = UTC+5:30) ──────────────────────────────────────
  # GitHub Actions cron is UTC. Convert your IST slots:
  #   07:00 IST = 01:30 UTC
  #   09:00 IST = 03:30 UTC
  #   12:00 IST = 06:30 UTC
  #   14:00 IST = 08:30 UTC
  #   17:30 IST = 12:00 UTC
  #   19:00 IST = 13:30 UTC
  #   21:00 IST = 15:30 UTC
  #   23:30 IST = 18:00 UTC
  schedule:
    - cron: '30 1 * * *'    # 07:00 IST
    - cron: '30 3 * * *'    # 09:00 IST
    - cron: '30 6 * * *'    # 12:00 IST
    - cron: '30 8 * * *'    # 14:00 IST
    - cron: '0 12 * * *'    # 17:30 IST
    - cron: '30 13 * * *'   # 19:00 IST
    - cron: '30 15 * * *'   # 21:00 IST
    - cron: '0 18 * * *'    # 23:30 IST

  # ── Manual trigger from GitHub UI ────────────────────────────────────────
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform(s) to scrape (blank = all)'
        required: false
        default: ''
      od_pair:
        description: 'OD pair ID (blank = all)'
        required: false
        default: ''

jobs:
  scrape:
    name: Scrape Prices
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Copy shared scraper files
        run: |
          # Copy the platform scrapers into the scraper/ directory
          cp -r scraper/scrapers ./scrapers 2>/dev/null || true

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd scraper

          # Build platform/OD args from manual trigger inputs
          PLATFORM_ARG=""
          OD_ARG=""

          if [ -n "${{ github.event.inputs.platform }}" ]; then
            PLATFORM_ARG="--platform ${{ github.event.inputs.platform }}"
          fi

          if [ -n "${{ github.event.inputs.od_pair }}" ]; then
            OD_ARG="--od ${{ github.event.inputs.od_pair }}"
          fi

          python main.py $PLATFORM_ARG $OD_ARG

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-failure-screenshots
          path: scraper/logs/*.png
          retention-days: 7

      - name: Notify on failure (optional — configure Slack webhook)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              --data '{"text":"⚠️ XanhSM scraper run FAILED — check GitHub Actions logs."}'
          fi
